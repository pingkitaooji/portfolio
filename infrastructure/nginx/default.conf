upstream portfolio_app {
    server portfolio:80;
}

charset utf-8;

upstream health_app {
    server web:8000;
}

upstream cqcalling_app {
    server cqcalling:8000;
}

upstream primerqc_app {
    server primerqc:8000;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location / {
        proxy_pass http://portfolio_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name health.yourdomain.com;

    client_max_body_size 30m;

    location /media/ {
        alias /srv/health-media/;
        add_header Cache-Control "private, no-store";
    }

    location / {
        proxy_pass http://health_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name cqcalling.yourdomain.com;

    location / {
        proxy_pass http://cqcalling_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name primerqc.yourdomain.com;

    location / {
        proxy_pass http://primerqc_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
